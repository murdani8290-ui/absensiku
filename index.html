const sb = {
  from: (table) => ({
    _table: table,
    _filters: [],
    _order: null,
    _limit: null,
    _select: '*',
    select(cols) { this._select = cols || '*'; return this; },
    eq(col, val) { this._filters.push(`${col}=eq.${encodeURIComponent(val)}`); return this; },
    neq(col, val) { this._filters.push(`${col}=neq.${encodeURIComponent(val)}`); return this; },
    gte(col, val) { this._filters.push(`${col}=gte.${encodeURIComponent(val)}`); return this; },
    lte(col, val) { this._filters.push(`${col}=lte.${encodeURIComponent(val)}`); return this; },
    ilike(col, val) { this._filters.push(`${col}=ilike.${encodeURIComponent(val)}`); return this; },
    order(col, opts) { this._order = `${col}.${opts && opts.ascending===false?'desc':'asc'}`; return this; },
    limit(n) { this._limit = n; return this; },
    _buildUrl(method) {
      let url = `${SUPABASE_URL}/rest/v1/${this._table}`;
      const params = [];
      if (method === 'GET') params.push(`select=${this._select}`);
      this._filters.forEach(f => params.push(f));
      if (this._order) params.push(`order=${this._order}`);
      if (this._limit) params.push(`limit=${this._limit}`);
      if (params.length) url += '?' + params.join('&');
      return url;
    },
    _headers(extra) {
      return Object.assign({
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      }, extra || {});
    },
    async _req(method, body) {
      try {
        const res = await fetch(this._buildUrl(method), {
          method,
          headers: this._headers(),
          body: body ? JSON.stringify(body) : undefined
        });
        if (!res.ok) { const err = await res.text(); return { data: null, error: err }; }
        const data = await res.json();
        return { data, error: null };
      } catch(e) { return { data: null, error: e.message }; }
    },
    async get() { return this._req('GET'); },
    async insert(row) {
      return fetch(`${SUPABASE_URL}/rest/v1/${this._table}`, {
        method: 'POST',
        headers: this._headers(),
        body: JSON.stringify(Array.isArray(row) ? row : [row])
      }).then(async r => ({data: r.ok ? await r.json() : null, error: r.ok ? null : await r.text()}))
        .catch(e => ({data:null,error:e.message}));
    },
    async update(row) {
      let qs = this._filters.join('&');
      const fullUrl = `${SUPABASE_URL}/rest/v1/${this._table}${qs?'?'+qs:''}`;
      return fetch(fullUrl, {
        method: 'PATCH',
        headers: this._headers(),
        body: JSON.stringify(row)
      }).then(async r => ({data: r.ok ? await r.json() : null, error: r.ok ? null : await r.text()}))
        .catch(e => ({data:null,error:e.message}));
    },
    async delete() {
      let qs = this._filters.join('&');
      const fullUrl = `${SUPABASE_URL}/rest/v1/${this._table}${qs?'?'+qs:''}`;
      return fetch(fullUrl, {
        method: 'DELETE',
        headers: this._headers({'Prefer':'return=minimal'})
      }).then(async r => ({data: null, error: r.ok ? null : await r.text()}))
        .catch(e => ({data:null,error:e.message}));
    },
    async upsert(row) {
      return fetch(`${SUPABASE_URL}/rest/v1/${this._table}`, {
        method: 'POST',
        headers: this._headers({'Prefer':'resolution=merge-duplicates,return=representation'}),
        body: JSON.stringify(Array.isArray(row) ? row : [row])
      }).then(async r => ({data: r.ok ? await r.json() : null, error: r.ok ? null : await r.text()}))
        .catch(e => ({data:null,error:e.message}));
    }
  })
};

const fmtTime = d => d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
const fmtDate = d => d.toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const fmtShort = s => { try { return new Date(s).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); } catch(e) { return s; }};
const todayStr = () => new Date().toISOString().split('T')[0];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const isLate = (ci, ss) => { const[h1,m1]=ci.split(':').map(Number); const[h2,m2]=ss.split(':').map(Number); return h1>h2||(h1===h2&&m1>m2); };
const haversine = (a,b,c,d) => { const R=6371000,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); };
const fmtDist = m => m<1000 ? `${Math.round(m)}m` : `${(m/1000).toFixed(1)}km`;
const fmtCoords = l => `${l.lat.toFixed(6)}, ${l.lng.toFixed(6)}`;
const fmtAgo = ts => { const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000); if(m<1)return'Baru saja'; if(m<60)return`${m} menit lalu`; const hh=Math.floor(m/60); if(hh<24)return`${hh} jam lalu`; return`${Math.floor(hh/24)} hari lalu`; };

const getGeo = () => new Promise(res => {
  if(!navigator.geolocation){res(null);return;}
  navigator.geolocation.getCurrentPosition(async pos => {
    const loc = {lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:Math.round(pos.coords.accuracy)};
    try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lng}&zoom=18`,{headers:{'Accept-Language':'id'}});const d=await r.json();if(d.display_name)loc.address=d.display_name.split(',').slice(0,3).join(',').trim();}catch(e){}
    res(loc);
  }, ()=>res(null), {enableHighAccuracy:true,timeout:10000,maximumAge:0});
});

function genDevice() {
  const cv=document.createElement('canvas'),ctx=cv.getContext('2d');cv.width=200;cv.height=50;
  ctx.textBaseline='top';ctx.font='14px Arial';ctx.fillStyle='#f60';ctx.fillRect(125,1,62,20);
  ctx.fillStyle='#069';ctx.fillText('DeviceFingerprint',2,15);ctx.fillStyle='rgba(102,204,0,0.7)';ctx.fillText('AbsenKu2024',4,35);
  const raw=[cv.toDataURL(),navigator.userAgent,navigator.language,screen.width+'x'+screen.height,screen.colorDepth,new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,navigator.deviceMemory||0,navigator.maxTouchPoints||0,navigator.platform||''].join('|');
  let hash=0; for(let i=0;i<raw.length;i++){hash=((hash<<5)-hash)+raw.charCodeAt(i);hash=hash&hash;}
  const id='DVC-'+Math.abs(hash).toString(36).toUpperCase().padStart(8,'0').slice(0,8);
  const ua=navigator.userAgent;
  let browser='Unknown'; if(ua.includes('Firefox'))browser='Firefox'; else if(ua.includes('Edg'))browser='Edge'; else if(ua.includes('Chrome'))browser='Chrome'; else if(ua.includes('Safari'))browser='Safari';
  let os='Unknown'; if(ua.includes('Windows'))os='Windows'; else if(ua.includes('Mac OS'))os='macOS'; else if(ua.includes('Android'))os='Android'; else if(ua.includes('iPhone')||ua.includes('iPad'))os='iOS'; else if(ua.includes('Linux'))os='Linux';
  return {id, name:`${browser} on ${os}`, browser, os, screen:`${screen.width}x${screen.height}`, registeredAt:new Date().toISOString()};
}

const exportCSV = (records, students, settings) => {
  const hdr = ['Tanggal','Kode Siswa','Nama','Kelas','NIS','Jam Masuk','Status','Jam Pulang','Device ID','Jarak Masuk'];
  const rows = records.map(r => {
    const s = students.find(x=>x.id===r.studentId);
    return [r.date,r.studentCode,r.studentName,s&&s.kelas||'-',s&&s.nis||'-',r.clockIn||'-',r.clockIn?(isLate(r.clockIn,settings.schoolStart)?'Terlambat':'Tepat Waktu'):'-',r.clockOut||'-',r.deviceId||'-',r.clockInDistance!=null?Math.round(r.clockInDistance)+'m':'-'].join(',');
  });
  const blob = new Blob([[hdr.join(','),...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='absensi_'+todayStr()+'.csv'; a.click();
};

function Clock({size}) {
  const[now,setNow]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  const parts=fmtTime(now).split(':');
  if(size==='sm') return h('div',{style:{fontFamily:ORB,color:'#00f0ff',fontSize:'1.125rem',textShadow:'0 0 10px rgba(0,240,255,.5)'}},parts.join(':'));
  return h('div',{style:{textAlign:'center'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}},
      parts.map((v,i)=>h(Fragment,{key:i},
        h('div',{style:Object.assign({},gl,{borderRadius:'12px',padding:'12px 16px',border:'1px solid rgba(0,240,255,.2)'})},
          h('span',{style:{fontFamily:ORB,fontSize:'2.5rem',fontWeight:'bold',color:'#00f0ff',textShadow:'0 0 10px rgba(0,240,255,.5)'}},v)),
        i<2&&h('span',{key:'sep'+i,style:{fontFamily:ORB,fontSize:'1.875rem',color:'rgba(0,240,255,.5)',animation:'pulse-glow 2s ease-in-out infinite'}},':')
      ))
    ),
    h('p',{style:{color:'rgba(255,255,255,.4)',marginTop:'16px',fontSize:'14px'}},fmtDate(now))
  );
}

function NotifBell({targetId}) {
  const[open,setOpen]=useState(false);
  const[notifs,setNotifs]=useState([]);
  const reload = useCallback(async()=>{
    const data = await DB.getNotifications(targetId);
    setNotifs(data);
  },[targetId]);
  useEffect(()=>{reload();const iv=setInterval(reload,5000);return()=>clearInterval(iv);},[reload]);
  const unread=notifs.filter(n=>!n.read).length;
  const markRead=async()=>{await DB.markNotificationsRead(targetId);reload();};
  const clearAll=async()=>{await DB.clearNotifications(targetId);setNotifs([]);};
  const bSt={position:'relative',width:'36px',height:'36px',borderRadius:'8px',background:'rgba(15,15,26,.7)',backdropFilter:'blur(20px)',border:'1px solid rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,.5)',cursor:'pointer',fontSize:'1rem'};

function StudentCalendar({student,records,settings,leaves}) {
  const[month,setMonth]=useState(new Date().getMonth());const[year,setYear]=useState(new Date().getFullYear());

  const monthName=new Date(year,month).toLocaleDateString('id-ID',{month:'long',year:'numeric'});

    const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const rec=myRecs.find(r=>r.date===ds);
    if(myLeaves.find(l=>ds>=l.startDate&&ds<=l.endDate))return 'leave';

    const[stu,rec,lv,an,set_]=await Promise.all([DB.getStudents(),DB.getRecords(),DB.getLeaves(),DB.getAnnouncements(),DB.getSettings()]);
    setStudents(stu);setRecords(rec);setLeaves(lv);setAnns(an);setSettings(set_);setLoading(false);
  },[]);
  useEffect(()=>{reload();},[reload]);
  useEffect(()=>{if(page!=='activity'){const iv=setInterval(reload,30000);return()=>clearInterval(iv);}},[page,reload]);

  const saveSettings=async s=>{await DB.saveSettings(s);setSettings(s);};
  const clearRecords=async()=>{if(confirm('Hapus SEMUA absensi?')){await DB.clearRecords();await DB.addLog('Admin','Clear Records','');await reload();}};

  if(loading||!settings)return h(LoadingScreen,{msg:'Memuat data...'});
  const pending=leaves.filter(l=>l.status==='pending').length;
  const nav=[{id:'dashboard',label:'Home',icon:'\uD83D\uDCCA'},{id:'students',label:'Siswa',icon:'\uD83C\uDF93'},{id:'attendance',label:'Absensi',icon:'\uD83D\uDCCB'},{id:'leaves',label:'Izin',icon:'\uD83D\uDCDD',badge:pending},{id:'announcements',label:'Info',icon:'\uD83D\uDCE2'},{id:'devices',label:'Device',icon:'\uD83D\uDCF1'},{id:'location',label:'Lokasi',icon:'\uD83D\uDCCD'},{id:'activity',label:'Log',icon:'\uD83D\uDCDC'},{id:'settings',label:'Setting',icon:'\u2699\uFE0F'}];
  return h('div',{style:{minHeight:'100vh',background:'#0a0a0f',color:'#fff',position:'relative'}},
    h(ParticleBg),
    h('header',{style:Object.assign({},glS,{position:'sticky',top:0,zIndex:30,borderBottom:'1px solid rgba(0,240,255,.1)'})},
      h('div',{style:{maxWidth:'512px',margin:'0 auto',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          h('div',{style:{width:'32px',height:'32px',borderRadius:'8px',background:'rgba(0,240,255,.1)',border:'1px solid rgba(0,240,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px'}},'\uD83D\uDEE1\uFE0F'),
          h('div',null,h('h1',{style:{fontFamily:ORB,fontSize:'14px',fontWeight:'bold',color:'#fff',letterSpacing:'0.1em'}},'ABSENSI',h('span',{style:{color:'#a855f7'}},'KU')),h('p',{style:{fontSize:'8px',fontFamily:MONO,color:'rgba(255,51,102,.6)',letterSpacing:'0.3em'}},'ADMIN PANEL'))
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          h(NotifBell,{targetId:'admin'}),
          h('button',{onClick:async()=>{await DB.addLog('Admin','Logout','');onLogout();},style:{color:'rgba(255,255,255,.3)',background:'none',border:'none',cursor:'pointer',fontSize:'12px',fontFamily:MONO}},'Keluar')
        )
      )
    ),
    h('main',{style:{position:'relative',zIndex:10,maxWidth:'512px',margin:'0 auto',padding:'24px 16px 112px'}},
      page==='dashboard'&&h(AdminDashboard,{students,records,settings,leaves}),
      page==='students'&&h(AdminStudents,{students,onReload:reload,settings}),
      page==='attendance'&&h(AdminAttendance,{records,students,settings}),
      page==='leaves'&&h(AdminLeaves,{leaves,onReload:reload}),
      page==='announcements'&&h(AdminAnnouncements,{announcements:anns,onReload:reload,students}),
      page==='devices'&&h(AdminDevices,{students,onReload:reload}),
      page==='location'&&h(AdminLocation,{settings,onSave:saveSettings}),
      page==='activity'&&h(AdminActivityLog),
      page==='settings'&&h(AdminSettings,{settings,onSave:saveSettings}),
      page==='settings'&&h('div',{style:Object.assign({},gl,{borderRadius:'16px',padding:'20px',border:'1px solid rgba(239,68,68,.15)',marginTop:'20px'})},h('p',{style:{fontFamily:ORB,fontSize:'12px',color:'rgba(248,113,113,.7)',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'12px'}},'Danger Zone'),h('button',{onClick:clearRecords,style:{width:'100%',padding:'12px',borderRadius:'12px',fontSize:'12px',fontFamily:MONO,color:'#f87171',border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.05)',cursor:'pointer'}},'Hapus Semua Absensi'))
    ),
    h(NavBar,{items:nav,active:page,onSelect:setPage})
  );
}

function StudentPanel({student,onLogout}) {
  const[page,setPage]=useState('home');
  const[camAction,setCamAction]=useState(null);
  const[loading,setLoading]=useState(true);
  const[records,setRecords]=useState([]);
  const[leaves,setLeaves]=useState([]);
  const[settings,setSettings]=useState(null);
  const[anns,setAnns]=useState([]);

  const reload=useCallback(async()=>{
    const[rec,lv,set_,an]=await Promise.all([DB.getRecords(),DB.getLeaves(),DB.getSettings(),DB.getAnnouncements()]);
    setRecords(rec.filter(r=>r.studentId===student.id));
    setLeaves(lv);setSettings(set_);setAnns(an);setLoading(false);
  },[student.id]);
  useEffect(()=>{reload();},[reload]);
  useEffect(()=>{const iv=setInterval(reload,30000);return()=>clearInterval(iv);},[reload]);

  const handleCapture=async(photo,location,distance)=>{
    const now=new Date();const time=fmtTime(now).substring(0,5);const date=todayStr();
    const existing=records.find(r=>r.date===date);
    let rec;
    if(camAction==='in'){
      rec=existing?Object.assign({},existing,{clockIn:time,clockInPhoto:photo,clockInLocation:location||null,clockInDistance:distance!=null?distance:null,deviceId:student.deviceId}):{id:uid(),studentId:student.id,studentName:student.name,studentCode:student.studentCode,date,clockIn:time,clockInPhoto:photo,clockInLocation:location||null,clockInDistance:distance!=null?distance:null,deviceId:student.deviceId};
      await DB.addLog(student.name,'Absen Masuk',time);
    } else {
      if(!existing)return;
      rec=Object.assign({},existing,{clockOut:time,clockOutPhoto:photo,clockOutLocation:location||null,clockOutDistance:distance!=null?distance:null});
      await DB.addLog(student.name,'Absen Pulang',time);
    }
    await DB.upsertRecord(rec);
    setCamAction(null);await reload();
  };

  if(loading||!settings)return h(LoadingScreen,{msg:'Memuat data...'});
  const nav=[{id:'home',label:'Beranda',icon:'\uD83C\uDFE0'},{id:'history',label:'Riwayat',icon:'\uD83D\uDCDC'},{id:'calendar',label:'Kalender',icon:'\uD83D\uDCC5'},{id:'leave',label:'Izin',icon:'\uD83D\uDCDD'},{id:'profile',label:'Profil',icon:'\uD83D\uDC64'}];
  return h('div',{style:{minHeight:'100vh',background:'#0a0a0f',color:'#fff',position:'relative'}},
    h(ParticleBg),
    h('header',{style:Object.assign({},glS,{position:'sticky',top:0,zIndex:30,borderBottom:'1px solid rgba(0,240,255,.1)'})},
      h('div',{style:{maxWidth:'512px',margin:'0 auto',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          h('div',{style:{width:'32px',height:'32px',borderRadius:'8px',background:'rgba(0,240,255,.1)',border:'1px solid rgba(0,240,255,.3)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:ORB,fontSize:'12px',color:'#00f0ff'}},student.name.charAt(0)),
          h('div',null,h('h1',{style:{fontFamily:ORB,fontSize:'14px',fontWeight:'bold',color:'#fff',letterSpacing:'0.1em'}},'ABSENSI',h('span',{style:{color:'#a855f7'}},'KU')),h('p',{style:{fontSize:'8px',fontFamily:MONO,color:'rgba(0,240,255,.4)',letterSpacing:'0.3em'}},student.studentCode+' - '+student.kelas))
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          h(NotifBell,{targetId:student.id}),
          h('button',{onClick:async()=>{await DB.addLog(student.name,'Logout','');onLogout();},style:{color:'rgba(255,255,255,.3)',background:'none',border:'none',cursor:'pointer',fontSize:'12px',fontFamily:MONO}},'Keluar')
        )
      )
    ),
    h('main',{style:{position:'relative',zIndex:10,maxWidth:'512px',margin:'0 auto',padding:'24px 16px 112px'}},
      page==='home'&&h(StudentHome,{student,records,settings,school:settings,announcements:anns,leaves,onOpenCamera:a=>setCamAction(a)}),
      page==='history'&&h(StudentHistory,{student,records,settings}),
      page==='calendar'&&h(StudentCalendar,{student,records,settings,leaves}),
      page==='leave'&&h(StudentLeave,{student,leaves,onReload:reload}),
      page==='profile'&&h(StudentProfile,{student,records,settings})
    ),
    h(NavBar,{items:nav,active:page,onSelect:setPage}),
    camAction&&h(CameraView,{action:camAction,school:settings,student,onCapture:handleCapture,onClose:()=>setCamAction(null)})
  );
}

// MAIN APP
// ================================================================
function App() {
  const[session,setSession]=useState(null);
  const[checking,setChecking]=useState(true);
  useEffect(()=>{
    DB.getSettings().then(()=>setChecking(false)).catch(()=>setChecking(false));
  },[]);
  if(checking)return h(LoadingScreen,{msg:'Menghubungkan ke Supabase...'});
  if(!session)return h(LoginScreen,{onLogin:setSession});
  if(session.role==='admin')return h(AdminPanel,{onLogout:()=>setSession(null)});
  return h(StudentPanel,{student:session.student,onLogout:()=>setSession(null)});
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>

<!-- PWA Install Prompt -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(r=>console.log('SW registered'))
      .catch(e=>console.log('SW error:',e));
  });
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  setTimeout(()=>{
    if(!deferredPrompt)return;
    const banner=document.createElement('div');
    banner.id='pwa-banner';
    banner.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(15,15,26,.95);border:1px solid rgba(0,240,255,.3);border-radius:16px;padding:12px 20px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.5);max-width:360px;width:calc(100% - 32px)';
    banner.innerHTML='<span style="font-size:24px">📲</span><div style="flex:1"><p style="color:#fff;font-size:13px;font-weight:600;margin:0">Install AbsensiKu</p><p style="color:rgba(255,255,255,.4);font-size:11px;margin:2px 0 0">Tambah ke layar utama</p></div><button onclick="installPWA()" style="background:rgba(0,240,255,.15);border:1px solid rgba(0,240,255,.4);color:#00f0ff;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600">Install</button><button onclick="document.getElementById('pwa-banner').remove()" style="background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:18px;padding:0 4px">x</button>';
    document.body.appendChild(banner);
  },3000);
});

function installPWA(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{deferredPrompt=null;const b=document.getElementById('pwa-banner');if(b)b.remove();});
  }
}

window.addEventListener('appinstalled',()=>{
  const b=document.getElementById('pwa-banner');if(b)b.remove();deferredPrompt=null;
});
</script>
